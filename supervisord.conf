[supervisord]
nodaemon=true
user=root

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port 8056
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/fastapi.log
stdout_logfile=/var/log/supervisor/fastapi.log

[program:worker]
command=python -m utils.worker
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/worker.log
stdout_logfile=/var/log/supervisor/worker.log