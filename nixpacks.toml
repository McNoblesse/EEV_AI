[phases.setup]
nixPkgs = ["python311", "postgresql", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir uvicorn",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt",
  ". /opt/venv/bin/activate && pip uninstall -y psycopg psycopg-pool && pip install 'psycopg[binary]' psycopg-pool"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
PYTHONPATH = "/app"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
PORT = "8000"