version: '3.8'

services:
  backend:
    build: .
    container_name: eev-ai-backend
    env_file:
      - .env
    ports:
      # Map host port 8056 to container port 8056
      - "8056:8056"
    volumes:
      - checkpoints_data:/app/checkpoint.sqlite
    # Tell uvicorn to run on port 8056 inside the container
    command: uvicorn main:app --host 0.0.0.0 --port 8056

volumes:
  checkpoints_data: